# Store sensitive values as base64-encoded strings.
# Generate: echo -n "your-value" | base64
#
# Apply with: kubectl apply -f k8s/secret.yaml
# NEVER commit real values to git — replace placeholders below before applying.

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: default
type: Opaque
data:
  # echo -n "10.68.0.3" | base64
  DB_HOST: REPLACE_WITH_BASE64_ENCODED_VALUE
  # echo -n "app_user" | base64
  DB_USER: REPLACE_WITH_BASE64_ENCODED_VALUE
  # echo -n "StrongPassword123!" | base64
  DB_PASS: REPLACE_WITH_BASE64_ENCODED_VALUE
  # echo -n "app_db" | base64
  DB_NAME: REPLACE_WITH_BASE64_ENCODED_VALUE
  # echo -n "my-app-images" | base64
  GCS_BUCKET: REPLACE_WITH_BASE64_ENCODED_VALUE
  # echo -n "10.68.1.5" | base64  (Memorystore private IP)
  REDIS_HOST: REPLACE_WITH_BASE64_ENCODED_VALUE
